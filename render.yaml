services:
  - type: web
    name: spqs-backend
    env: python
    region: singapore
    plan: free
    healthCheckPath: /api/v1/health

    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT

    envVars:
      - key: ENVIRONMENT
        value: production

      - key: FRONTEND_URL
        sync: false

      - key: ALLOWED_HOSTS
        sync: false

      - key: DATABASE_URL
        value: sqlite:////data/standard_pumps.db

    disk:
      name: spqs-data
      mountPath: /data